<svg viewBox="0 0 320 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g-body" x1="160" y1="105" x2="160" y2="252" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e1645"/>
      <stop offset="1" stop-color="#100e2a"/>
    </linearGradient>
    <linearGradient id="g-lid" x1="160" y1="62" x2="160" y2="114" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2c2060"/>
      <stop offset="1" stop-color="#1a1440"/>
    </linearGradient>
    <linearGradient id="g-ribbon-v" x1="160" y1="62" x2="160" y2="252" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffd875"/>
      <stop offset="0.5" stop-color="#f0a41a"/>
      <stop offset="1" stop-color="#b87300"/>
    </linearGradient>
    <linearGradient id="g-ribbon-h" x1="62" y1="178" x2="258" y2="178" gradientUnits="userSpaceOnUse">
      <stop stop-color="#b87300"/>
      <stop offset="0.3" stop-color="#f0a41a"/>
      <stop offset="0.7" stop-color="#f0a41a"/>
      <stop offset="1" stop-color="#b87300"/>
    </linearGradient>
    <linearGradient id="g-bow-l" x1="160" y1="88" x2="110" y2="65" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0a41a"/>
      <stop offset="1" stop-color="#ffd875"/>
    </linearGradient>
    <linearGradient id="g-bow-r" x1="160" y1="88" x2="210" y2="65" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0a41a"/>
      <stop offset="1" stop-color="#ffd875"/>
    </linearGradient>
    <radialGradient id="g-ambient" cx="50%" cy="60%" r="50%">
      <stop stop-color="#7c5cfc" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#7c5cfc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-qglow" cx="50%" cy="50%" r="50%">
      <stop stop-color="#a08fff" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#7c5cfc" stop-opacity="0"/>
    </radialGradient>
    <filter id="f-drop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="f-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="f-star" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ambient purple glow behind box -->
  <ellipse cx="160" cy="185" rx="128" ry="95" fill="url(#g-ambient)"/>

  <!-- Ground shadow -->
  <ellipse cx="160" cy="262" rx="74" ry="9" fill="#000" fill-opacity="0.32"/>

  <!-- ── BODY ── -->
  <rect x="62" y="105" width="196" height="147" rx="10" fill="url(#g-body)" filter="url(#f-drop)"/>
  <!-- Purple border glow -->
  <rect x="62" y="105" width="196" height="147" rx="10" fill="none" stroke="#7c5cfc" stroke-width="1.5" stroke-opacity="0.35"/>
  <!-- Top edge highlight -->
  <path d="M72,106 L248,106 Q272,106 272,116" stroke="white" stroke-width="1" stroke-opacity="0.12" stroke-linecap="round"/>
  <!-- Inner panel etching -->
  <rect x="78" y="122" width="164" height="118" rx="5" fill="none" stroke="white" stroke-width="0.7" stroke-opacity="0.07"/>
  <!-- Corner accent jewels -->
  <circle cx="74" cy="117" r="3.5" fill="#7c5cfc" fill-opacity="0.6"/>
  <circle cx="246" cy="117" r="3.5" fill="#7c5cfc" fill-opacity="0.6"/>
  <circle cx="74" cy="240" r="3.5" fill="#7c5cfc" fill-opacity="0.6"/>
  <circle cx="246" cy="240" r="3.5" fill="#7c5cfc" fill-opacity="0.6"/>
  <!-- Corner jewel highlights -->
  <circle cx="73" cy="116" r="1.5" fill="white" fill-opacity="0.4"/>
  <circle cx="245" cy="116" r="1.5" fill="white" fill-opacity="0.4"/>

  <!-- ── LID ── -->
  <rect x="48" y="62" width="224" height="52" rx="10" fill="url(#g-lid)" filter="url(#f-drop)"/>
  <!-- Lid border glow -->
  <rect x="48" y="62" width="224" height="52" rx="10" fill="none" stroke="#a08fff" stroke-width="1.5" stroke-opacity="0.3"/>
  <!-- Lid top shine -->
  <rect x="49" y="63" width="222" height="20" rx="9" fill="white" fill-opacity="0.08"/>
  <!-- Lid inner panel -->
  <rect x="62" y="74" width="196" height="30" rx="4" fill="none" stroke="white" stroke-width="0.7" stroke-opacity="0.07"/>
  <!-- Lid-body seam -->
  <line x1="62" y1="113" x2="258" y2="113" stroke="#a08fff" stroke-width="1" stroke-opacity="0.22"/>

  <!-- ── RIBBON vertical ── -->
  <rect x="145" y="62" width="30" height="190" fill="url(#g-ribbon-v)"/>
  <!-- Shine left edge -->
  <rect x="145" y="62" width="5" height="190" fill="white" fill-opacity="0.22"/>
  <!-- Shadow right edge -->
  <rect x="170" y="62" width="5" height="190" fill="black" fill-opacity="0.15"/>

  <!-- ── RIBBON horizontal ── -->
  <rect x="62" y="167" width="196" height="24" fill="url(#g-ribbon-h)"/>
  <!-- Shine top edge -->
  <rect x="62" y="167" width="196" height="4" fill="white" fill-opacity="0.2"/>
  <!-- Shadow bottom edge -->
  <rect x="62" y="187" width="196" height="4" fill="black" fill-opacity="0.15"/>

  <!-- ── BOW ── -->
  <!-- Left petal -->
  <path d="M160,88 C148,70 118,58 110,72 C102,86 132,97 160,88Z" fill="url(#g-bow-l)"/>
  <path d="M160,88 C148,70 118,58 110,72 C102,86 132,97 160,88Z" fill="black" fill-opacity="0.1"/>
  <path d="M150,73 C140,67 122,63 115,70" stroke="white" stroke-width="2" stroke-opacity="0.28" stroke-linecap="round" fill="none"/>
  <!-- Right petal -->
  <path d="M160,88 C172,70 202,58 210,72 C218,86 188,97 160,88Z" fill="url(#g-bow-r)"/>
  <path d="M160,88 C172,70 202,58 210,72 C218,86 188,97 160,88Z" fill="black" fill-opacity="0.1"/>
  <path d="M170,73 C180,67 198,63 205,70" stroke="white" stroke-width="2" stroke-opacity="0.28" stroke-linecap="round" fill="none"/>
  <!-- Bow knot layers -->
  <circle cx="160" cy="88" r="14" fill="#d88f00"/>
  <circle cx="160" cy="88" r="11" fill="#f0a41a"/>
  <circle cx="160" cy="88" r="7" fill="#ffd060"/>
  <circle cx="160" cy="88" r="3.5" fill="#f0a41a"/>
  <!-- Bow highlight -->
  <circle cx="156.5" cy="84.5" r="3" fill="white" fill-opacity="0.42"/>

  <!-- ── QUESTION MARK ── -->
  <!-- Soft glow behind ? -->
  <ellipse cx="160" cy="208" rx="32" ry="36" fill="url(#g-qglow)"/>
  <!-- Glow text layer -->
  <text x="160" y="230" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif"
    font-size="78" font-weight="900"
    fill="#9b7fff" fill-opacity="0.25" filter="url(#f-glow)">?</text>
  <!-- Main ? text -->
  <text x="160" y="230" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif"
    font-size="78" font-weight="900"
    fill="white" fill-opacity="0.1">?</text>

  <!-- ── SPARKLE DECORATIONS ── -->
  <!-- Large 4-point star, top-left -->
  <path d="M84,44 L86.3,50.2 L92,52 L86.3,53.8 L84,60 L81.7,53.8 L76,52 L81.7,50.2Z"
    fill="#f0a41a" fill-opacity="0.9" filter="url(#f-star)"/>
  <!-- Large 4-point star, top-right -->
  <path d="M246,35 L247.8,40.4 L253,42 L247.8,43.6 L246,49 L244.2,43.6 L239,42 L244.2,40.4Z"
    fill="#a08fff" fill-opacity="0.9" filter="url(#f-star)"/>
  <!-- Small star, right mid -->
  <path d="M280,152 L281.4,156.2 L285,157 L281.4,157.8 L280,162 L278.6,157.8 L275,157 L278.6,156.2Z"
    fill="#f0a41a" fill-opacity="0.74"/>
  <!-- Small star, left mid -->
  <path d="M38,162 L39.4,166.2 L43,167 L39.4,167.8 L38,172 L36.6,167.8 L33,167 L36.6,166.2Z"
    fill="#a08fff" fill-opacity="0.74"/>
  <!-- Dot sparkles -->
  <circle cx="295" cy="100" r="2.5" fill="#ffc147" fill-opacity="0.65"/>
  <circle cx="28" cy="126" r="2" fill="#a08fff" fill-opacity="0.6"/>
  <circle cx="268" cy="248" r="2" fill="#f0a41a" fill-opacity="0.55"/>
  <circle cx="52" cy="242" r="2.5" fill="#7c5cfc" fill-opacity="0.68"/>
  <circle cx="288" cy="200" r="1.8" fill="#ffd875" fill-opacity="0.55"/>
  <circle cx="34" cy="200" r="1.8" fill="#7c5cfc" fill-opacity="0.52"/>
  <circle cx="302" cy="172" r="1.5" fill="#a08fff" fill-opacity="0.48"/>
  <circle cx="20" cy="174" r="1.5" fill="#ffc147" fill-opacity="0.48"/>
</svg>
